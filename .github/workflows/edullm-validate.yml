name: Validate eduLLM job request

on:
  issues:
    types: [opened, edited, reopened]

concurrency:
  group: edullm-validate-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: read
  checks: read

jobs:
  validate:
    # Manual governance gate: a reviewed code change must remove this literal false.
    if: ${{ false && contains(github.event.issue.labels.*.name, 'edullm-job') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install validation package
        run: python -m pip install -e .
      - name: Validate current Issue
        run: python -m edullm.cli automation validate --issue "$ISSUE_NUMBER"
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
