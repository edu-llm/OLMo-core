name: Assign eduLLM jobs

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: edullm-assignment
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  assign:
    # Manual governance gate: a reviewed code change must remove this literal false.
    if: ${{ false && github.repository != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install assignment package
        run: python -m pip install -e .
      - name: Scan, assign, and notify
        run: python -m edullm.cli automation assign
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
