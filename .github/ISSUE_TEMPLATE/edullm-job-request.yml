name: eduLLM job request
description: Request a policy-validated eduLLM pilot job.
title: "[eduLLM job]: "
labels:
  - edullm-job
  - status:requested
body:
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: Explain the research purpose and why this pilot job is needed.
    validations:
      required: true
  - type: input
    id: study
    attributes:
      label: Study
      description: Stable lowercase study identifier.
    validations:
      required: true
  - type: input
    id: condition
    attributes:
      label: Condition
      description: Stable condition identifier for this request.
    validations:
      required: true
  - type: input
    id: comparison
    attributes:
      label: Comparison
      description: Baseline or comparison condition.
    validations:
      required: true
  - type: input
    id: commit_sha
    attributes:
      label: Commit SHA
      description: Exact lowercase 40-character pushed commit SHA from edu-llm/OLMo-core.
    validations:
      required: true
  - type: dropdown
    id: entrypoint_profile
    attributes:
      label: Entrypoint profile
      description: Protected entrypoint profile to validate.
      options:
        - generic-smoke
        - hypothesis-smoke
    validations:
      required: true
  - type: input
    id: script_path
    attributes:
      label: Script path
      description: Repository-relative script path matching the selected entrypoint profile.
    validations:
      required: true
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      description: Launcher matching the selected entrypoint profile.
      options:
        - python
        - torchrun
        - bash
    validations:
      required: true
  - type: textarea
    id: arguments_json
    attributes:
      label: Arguments JSON
      description: Enter the complete ordered JSON string array; each argument must be a separate string.
      placeholder: '["train_single", "study-condition", "local", "--seed=0"]'
    validations:
      required: true
  - type: input
    id: data_manifest
    attributes:
      label: Data manifest
      description: Approved builtin URI or absolute /orcd/pool manifest path.
    validations:
      required: true
  - type: input
    id: data_manifest_sha256
    attributes:
      label: Data manifest SHA-256
      description: Lowercase 64-character digest for the exact manifest.
    validations:
      required: true
  - type: dropdown
    id: data_classification
    attributes:
      label: Data classification
      description: Restricted data is not accepted by the public pilot queue.
      options:
        - public
        - research-cleared
    validations:
      required: true
  - type: input
    id: seed
    attributes:
      label: Seed
      description: Integer seed from 0 through 2147483647.
    validations:
      required: true
  - type: dropdown
    id: wandb_project
    attributes:
      label: W&B project
      description: Protected eduLLM W&B project.
      options:
        - test
        - pretraining
        - posttraining
        - evaluation
        - data-pipeline
    validations:
      required: true
  - type: textarea
    id: success_signal
    attributes:
      label: Success signal
      description: State the observable condition that makes this run successful.
    validations:
      required: true
  - type: input
    id: success_metrics
    attributes:
      label: Success metrics
      description: Comma-separated emitted metric names, without whitespace inside a name.
    validations:
      required: true
  - type: dropdown
    id: gpu_count
    attributes:
      label: GPU count
      description: Number of GPUs requested for the pilot.
      options:
        - "1"
        - "2"
    validations:
      required: true
  - type: dropdown
    id: gpu_preference
    attributes:
      label: GPU preference
      description: Allowed GPU preference; scheduling may use any when selected.
      options:
        - any
        - l40s
        - h100
        - h200
    validations:
      required: true
  - type: input
    id: maximum_runtime_minutes
    attributes:
      label: Maximum runtime minutes
      description: Positive integer no greater than the protected policy maximum.
    validations:
      required: true
