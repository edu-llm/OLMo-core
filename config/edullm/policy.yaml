required_checks:
  - Lint
  - Test
  - Test checkpoint
  - Test transformer
  - Test attention
  - Test examples
  - Test scripts
  - Test eduLLM core
  - Integration tests
  - Test olmo3 ladder
  - Type check
  - Build
  - Style
  - Docs
reminder_after_minutes: 15
reassign_after_minutes: 30
