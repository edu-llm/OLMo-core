wandb_entity: eduLLM
allowed_wandb_projects:
  - test
  - pretraining
  - posttraining
  - evaluation
  - data-pipeline
repository_url: https://github.com/edu-llm/OLMo-core.git
scratch_root: $HOME/orcd/scratch/edullm
slurm_partition: mit_normal_gpu
slurm_memory: 64G
slurm_cpus_per_gpu: 4
max_runtime_minutes: 360
max_gpu_count: 2
